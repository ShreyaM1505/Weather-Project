<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>current weather</title>
    <link rel="stylesheet" href="weather.css">
</head>
<body>
    <div class="container">
        <h1>Weather App</h1>
        <div class="input-container">
            <input placeholder="Enter City Name" type="text" id="city-name">
            <button id="get-weatherBtn">Get Weather</button>
        </div>
        <div id="weather-info" class="hidden">
            <h2 id="mycity-name"></h2>
            <p id="temperature"></p>
            <p id="discription"></p>
        </div>
        <p id="error-message" class="hidden" >City not fount,Please try again</p>
    </div>
</body>
<script src="weather.js"></script>
<script src="server.js"></script>
</html>
